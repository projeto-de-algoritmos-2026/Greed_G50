<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

</head>
<body>

                <button id="historyClearBtn" class="btn">Limpar</button>

            <div id="historyList" style="margin-top:12px; min-height:120px;"></div>
        </div>
    </div>

<script type="module" src="{{ url_for('static', filename='js/history.js') }}"></script>
