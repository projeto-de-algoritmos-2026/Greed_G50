<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greed — Jogo do Troco</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .container { max-width: 820px; margin: 24px auto; padding: 12px; }
        .panel { background:var(--panel); padding:12px; border-radius:6px; box-shadow:0 1px 6px rgba(0,0,0,0.06);} 
        .greed-coin-row { display:flex; align-items:center; gap:8px; }
        input[type=number] { padding:6px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <h1 style="margin:0;">💰 Greed — Jogo do Troco</h1>
                <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
                    <button id="soundToggleBtn" class="btn" aria-pressed="true" aria-label="Ativar som">Som</button>
                    <button id="compactToggleBtn" class="btn" aria-pressed="false" aria-label="Modo compacto">Compacto</button>
                </div>
            </div>
            <p>Teste o algoritmo guloso: entregue o troco usando o menor número de moedas possível.</p>
        </header>

        <div class="panel" style="margin-top:12px;">
            <h2>Configurar Nível</h2>
            <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                <div class="form-group" style="min-width:160px;">
                    <label for="greedAmountInput">Valor</label>
                    <input id="greedAmountInput" aria-label="Valor a formar" type="number" min="0.01" step="0.01" value="0.93">
                </div>
                <div class="form-group" style="min-width:220px;">
                    <label>Moedas (selecione valores)</label>
                    <div class="coin-options" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;">
                        <label class="coin-option"><input type="checkbox" value="2.00" checked> 2.00</label>
                        <label class="coin-option"><input type="checkbox" value="1.00" checked> 1.00</label>
                        <label class="coin-option"><input type="checkbox" value="0.50" checked> 0.50</label>
                        <label class="coin-option"><input type="checkbox" value="0.25" checked> 0.25</label>
                        <label class="coin-option"><input type="checkbox" value="0.20"> 0.20</label>
                        <label class="coin-option"><input type="checkbox" value="0.10" checked> 0.10</label>
                        <label class="coin-option"><input type="checkbox" value="0.05" checked> 0.05</label>
                        <label class="coin-option"><input type="checkbox" value="0.02"> 0.02</label>
                        <label class="coin-option"><input type="checkbox" value="0.01" checked> 0.01</label>
                    </div>
                
                <div style="align-self:center; min-width:160px;">
                    <button id="greedStartBtn" class="btn btn-start" aria-label="Iniciar jogo">Iniciar Troco</button>
                </div>
            </div>

            <div id="greedPanel" class="greed-panel" style="margin-top:12px; display:none;">
                <div id="greedScoreboard" class="greed-scoreboard">
                    <div><strong>Nível:</strong> <span id="greedLevel">1</span></div>
                    <div><strong>Pontos:</strong> <span id="greedScore">0</span></div>
                    <div><strong>Melhor:</strong> <span id="greedBest">0</span></div>
                    <div><strong>Tempo:</strong> <span id="greedTimer">0s</span></div>
                    <div style="margin-left:auto; display:flex; gap:8px;">
                        <button id="greedHistoryBtn" class="btn">Ver Histórico</button>
                        <button id="greedNextBtn" class="btn" style="display:none;">Próximo Nível</button>
                    </div>
                </div>

                <div class="greed-layout">
                    <main class="greed-main">
                        <section id="greedCoinsContainer" class="greed-coins"></section>

                        <div id="greedStatus" class="greed-status">
                            <div id="greedSumDisplay">Soma: 0</div>
                            <div id="greedCoinsCount">Moedas: 0</div>
                            <div id="greedValidity" class="greed-validity">Aguardando</div>
                        </div>

                        <div class="greed-actions">
                            <button id="greedSubmitBtn" class="btn" disabled>Enviar Troco</button>
                            <button id="greedAnimateBtn" class="btn">Mostrar Gulosa</button>
                            <span id="greedMessage" role="status" aria-live="polite" style="margin-left:8px"></span>
                        </div>

                        <div id="greedResults" class="greed-results"></div>
                    </main>

                    <aside class="greed-side">
                
                    </aside>
                </div>
                
                <div class="bottom-panels" style="margin-top:18px;">
                    <div id="greedAnimation" class="panel-box" aria-live="polite" role="region" aria-label="Animação gulosa">
                        <div class="panel-title">Animação Gulosa</div>
                        <div id="greedAnimationContent"></div>
                    </div>
                    <!-- optimal solution panel removed -->
                </div>
            </div>
        </div>
        
                
        <div id="greedHistoryModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
            <div style="background:var(--panel); color:var(--text); max-width:720px; width:90%; padding:16px; border-radius:8px; max-height:80%; overflow:auto;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <h3 style="margin:0;">Histórico de Pontuação</h3>
                    <div style="margin-left:auto; display:flex; gap:8px;"><button id="greedClearHistoryBtn" class="btn">Limpar</button><button id="greedCloseHistoryBtn" class="btn">Fechar</button></div>
                </div>
                <div id="greedHistoryContent" style="margin-top:12px;"></div>
            </div>
        </div>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/game-ui.js') }}"></script>
</body>
</html>
